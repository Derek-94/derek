<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8083ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square with glow filter -->
  <rect width="32" height="32" rx="8" fill="url(#bg)" filter="url(#glow)"/>
  <!-- Subtle inner highlight -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="rgba(192,193,255,0.25)" stroke-width="1"/>
  <!-- Terminal > symbol -->
  <text
    x="16"
    y="23"
    font-family="'Space Grotesk', 'Courier New', monospace"
    font-size="20"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    opacity="0.95"
  >&gt;</text>
</svg>
